services:
  - type: web
    name: music-bot
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PROXY_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
